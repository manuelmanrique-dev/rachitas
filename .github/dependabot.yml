version: 2
updates:
  # npm dependencies (se activa cuando exista package.json)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Madrid"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
      include: "scope"
    groups:
      # Agrupa patches y minors en una sola PR para reducir ruido
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions (versiones de las actions que usamos)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "ci"