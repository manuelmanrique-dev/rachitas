name: PR Title

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

permissions:
  pull-requests: read

jobs:
  validate:
    name: Validate Conventional Commits format
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            chore
            docs
            refactor
            test
            build
            ci
            perf
            style
            revert
          requireScope: false
          subjectPattern: ^[a-zA-Z0-9].+$
          subjectPatternError: |
            El subject de la PR debe empezar con letra o número y tener al menos 2 caracteres.